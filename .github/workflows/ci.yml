name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ===== BACKEND =====
  backend-test:
    name: Backend — Tests (Testcontainers + ArchUnit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run backend tests
        working-directory: backend
        run: mvn test -pl . --no-transfer-progress
        # Testcontainers pulls Docker images automatically on the ubuntu runner

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend

  backend-build:
    name: Backend — Build Docker Image
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false          # set to true + add registry credentials to push
          tags: gokarting-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== FRONTEND =====
  frontend-check:
    name: Frontend — TypeScript + Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
        continue-on-error: true   # advisory only until lint rules are stabilized

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ===== STATUS GATE =====
  all-checks-pass:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    steps:
      - run: echo "All required checks passed ✓"
