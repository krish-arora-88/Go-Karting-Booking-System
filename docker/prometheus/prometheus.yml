global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gokarting-api"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8080"]
    # Label all metrics with the service name
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "gokarting-api"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
