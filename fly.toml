app = "apex-racing-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "no-kafka"
  CORS_ORIGINS = "https://apex-racing-gokarting.vercel.app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/actuator/health"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
